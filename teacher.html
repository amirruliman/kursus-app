<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pengajar — Kursus App</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

<div class="app-layout">

  <!-- ── Sidebar ──────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
      </div>
      <span class="sidebar-brand-name">Kursus App</span>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item active" data-section="dashboard">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </button>
      <button class="nav-item" data-section="schedules">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Jadwal Mengajar
      </button>
      <button class="nav-item" data-section="attendance">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="m9 16 2 2 4-4"/></svg>
        Absensi Kelas
      </button>
      <button class="nav-item" data-section="requests">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Permintaan Jadwal
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="user-avatar">P</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="user-name">Pengajar</div>
          <div class="sidebar-user-role">Pengajar</div>
        </div>
      </div>
      <button class="btn-logout" onclick="Auth.logout()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Keluar
      </button>
    </div>
  </aside>

  <!-- ── Main Content ──────────────────────────────────────── -->
  <main class="main-content">

    <!-- Dashboard -->
    <section id="section-dashboard" class="content-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Dashboard</div>
          <div class="page-subtitle">Ringkasan aktivitas mengajar Anda</div>
        </div>
      </div>
      <div style="padding:24px 28px;">
        <div class="stats-grid" id="teacher-stats">
          <div class="loading-spinner"></div>
        </div>
        <div class="grid-2" style="margin-top:0;">
          <div class="card">
            <div class="card-header">
              <span class="card-title">Jadwal Hari Ini</span>
              <span id="today-label" class="badge badge-primary"></span>
            </div>
            <div class="card-body" id="today-schedules"><div class="loading-spinner"></div></div>
          </div>
          <div class="card">
            <div class="card-header"><span class="card-title">Kelas yang Diampu</span></div>
            <div class="card-body" id="teacher-classes"><div class="loading-spinner"></div></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Schedules -->
    <section id="section-schedules" class="content-section">
      <div class="page-header">
        <div>
          <div class="page-title">Jadwal Mengajar</div>
          <div class="page-subtitle">Semua jadwal kelas yang Anda ampu</div>
        </div>
      </div>
      <div style="padding:24px 28px;">
        <div id="schedules-view"><div class="loading-spinner"></div></div>
      </div>
    </section>

    <!-- Attendance -->
    <section id="section-attendance" class="content-section">
      <div class="page-header">
        <div>
          <div class="page-title">Absensi Kelas</div>
          <div class="page-subtitle">Buka sesi dan isi kehadiran peserta</div>
        </div>
        <button class="btn btn-primary" onclick="TeacherAttendance.openCreateSession()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Buka Sesi
        </button>
      </div>
      <div style="padding:24px 28px;">
        <div id="teacher-attendance-view"><div class="loading-spinner"></div></div>
      </div>
    </section>

    <!-- Schedule Requests -->
    <section id="section-requests" class="content-section">
      <div class="page-header">
        <div>
          <div class="page-title">Permintaan Perubahan Jadwal</div>
          <div class="page-subtitle">Ajukan permintaan perubahan jadwal mengajar</div>
        </div>
        <button class="btn btn-primary" onclick="TeacherRequests.openCreate()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Ajukan Permintaan
        </button>
      </div>
      <div style="padding:24px 28px;">
        <div id="requests-view"><div class="loading-spinner"></div></div>
      </div>
    </section>

  </main>
</div>

<!-- Modal Overlay -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div id="modal-container" class="modal-container"></div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/teacher.js"></script>
</body>
</html>
