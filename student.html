<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Siswa — Kursus App</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

<div class="app-layout">

  <!-- ── Sidebar ──────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
      </div>
      <span class="sidebar-brand-name">Kursus App</span>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item active" data-section="dashboard">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </button>
      <button class="nav-item" data-section="attendance">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="m9 16 2 2 4-4"/></svg>
        Rekap Kehadiran
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="user-avatar">S</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="user-name">Siswa</div>
          <div class="sidebar-user-role">Siswa</div>
        </div>
      </div>
      <button class="btn-logout" onclick="Auth.logout()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Keluar
      </button>
    </div>
  </aside>

  <!-- ── Main Content ──────────────────────────────────────── -->
  <main class="main-content">

    <!-- Dashboard -->
    <section id="section-dashboard" class="content-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Dashboard</div>
          <div class="page-subtitle" id="dashboard-greeting">Selamat datang</div>
        </div>
      </div>
      <div style="padding:24px 28px;">
        <div class="stats-grid" id="student-stats">
          <div class="loading-spinner"></div>
        </div>
        <div class="grid-2">
          <div class="card">
            <div class="card-header">
              <span class="card-title">Kehadiran Bulan Ini</span>
              <span id="current-month-label" class="badge badge-primary"></span>
            </div>
            <div class="card-body" id="monthly-chart">
              <div class="loading-spinner"></div>
            </div>
          </div>
          <div class="card">
            <div class="card-header"><span class="card-title">Kelas yang Diikuti</span></div>
            <div class="card-body" id="student-classes"><div class="loading-spinner"></div></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Attendance Recap -->
    <section id="section-attendance" class="content-section">
      <div class="page-header">
        <div>
          <div class="page-title">Rekap Kehadiran</div>
          <div class="page-subtitle">Riwayat kehadiran Anda</div>
        </div>
        <button class="btn btn-secondary no-print" onclick="StudentAttendance.exportPdf()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Unduh PDF
        </button>
      </div>
      <div style="padding:24px 28px;">

        <!-- Print header (only visible when printing) -->
        <div class="print-header">
          <h2 id="print-title">Rekap Kehadiran</h2>
          <p id="print-subtitle"></p>
        </div>

        <div class="filter-bar no-print">
          <div class="form-group">
            <label>Dari Tanggal</label>
            <input type="date" id="att-start">
          </div>
          <div class="form-group">
            <label>Sampai Tanggal</label>
            <input type="date" id="att-end">
          </div>
          <div class="form-group" style="justify-content:flex-end;">
            <label>&nbsp;</label>
            <button class="btn btn-primary" onclick="StudentAttendance.load()">Tampilkan</button>
          </div>
        </div>

        <div id="student-att-summary" class="hidden" style="margin-bottom:16px;"></div>
        <div id="student-att-view"></div>
      </div>
    </section>

  </main>
</div>

<!-- Modal Overlay -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div id="modal-container" class="modal-container"></div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/student.js"></script>
</body>
</html>
